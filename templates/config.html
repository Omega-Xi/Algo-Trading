<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Bot Configuration</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      min-height: 100vh;
    }
    .form-container {
      background-color: #1e1e1e;
      color: #f5f5f5;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 500px;
    }
    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #ffffff;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-size: 14px;
      color: #cccccc;
    }
    input[type="text"], input[type="number"] {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #2c2c2c;
      color: #f5f5f5;
      width: 100%;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #4a90e2;
    }
    input[type="submit"] {
      padding: 12px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
      width: 100%;
    }
    input[type="submit"]:hover {
      background-color: #357ab8;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Trading Bot Configuration</h2>
    <form action="/config/save_config" method="post">
      <label for="adx">ADX Threshold:</label>
      <input type="number" id="adx" name="ADX_TRESHOLD" value="25">

      <label for="rsi_low">RSI Threshold Low:</label>
      <input type="number" id="rsi_low" name="RSI_TRESHOLD_LOW" value="30">

      <label for="rsi_high">RSI Threshold High:</label>
      <input type="number" id="rsi_high" name="RSI_TRESHOLD_HIGH" value="70">

      <label for="rsi_mid">RSI Threshold Mid:</label>
      <input type="number" id="rsi_mid" name="RSI_TRESHOLD_MID" value="50">

      <label for="vwap">VWAP Close Tolerance:</label>
      <input type="text" id="vwap" name="VWAP_CLOSE_TOLERANCE" value="0.00001">

      <label for="dry_run_margin">Dry Run Margin:</label>
      <input type="number" id="dry_run_margin" name="DRY_RUN_MARGIN" value="100000">

      <label for="risk_percent">Risk Percent:</label>
      <input type="number" step="0.1" id="risk_percent" name="RISK_PERCENT" value="2.0">

      <label for="r_to_r">Risk-to-Reward Ratio:</label>
      <input type="number" step="0.1" id="r_to_r" name="R_TO_R_RATIO" value="10.0">

      <label for="atr_multiplier">ATR Multiplier:</label>
      <input type="number" step="0.1" id="atr_multiplier" name="ATR_MULTIPLIER" value="1.5">

      <label for="entry_cooldown">Entry Cooldown (seconds):</label>
      <input type="number" id="entry_cooldown" name="ENTRY_COOLDOWN" value="30">

      <label for="market_open">Market Open Time:</label>
      <input type="text" id="market_open" name="MARKET_OPEN_TIME" value="09:15">

      <label for="market_close">Market Close Time:</label>
      <input type="text" id="market_close" name="MARKET_CLOSE_TIME" value="15:30">

      <input type="submit" value="Save Configuration">
    </form>
  </div>
</body>
</html>
