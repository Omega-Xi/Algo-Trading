<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Bot Dashboard</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      height: 100vh;
    }
    .container {
      background-color: #1e1e1e;
      color: #f5f5f5;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      text-align: center;
      width: 500px;
    }
    h1 {
      margin-bottom: 20px;
      color: #ffffff;
    }
    p {
      margin-bottom: 30px;
      color: #cccccc;
    }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin: 10px;
      background-color: #4a90e2;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #357ab8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Algo Trading Bot</h1>
    <p>Lets get started with your trading journey!</p>
    <a href="/authenticator/login" class="btn">Start Trading</a>
  </div>
</body>
</html>
