<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      height: 100vh;
      flex-direction: column;
    }
    .form-container {
      background-color: #1e1e1e;
      color: #f5f5f5;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 400px;
      margin: 15px;
      text-align: center;
    }
    .form-container h2 {
      margin-bottom: 20px;
      color: #ffffff;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    input[type="text"] {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #2c2c2c;
      color: #f5f5f5;
      width: 100%;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
    }
    input[type="submit"] {
      padding: 12px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
      width: 100%;
    }
    input[type="submit"]:hover {
      background-color: #357ab8;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Generate Login URL</h2>
    <form action="/authenticator/generate_login_uri" method="get">
      <input type="submit" value="Generate Login URL using Upstox API">
    </form>
  </div>

  <div class="form-container">
    <h2>Generate Access Token</h2>
    <form action="/authenticator/token" method="post">
      <input type="text" name="redirect_uri" placeholder="Enter Redirect URI" required>
      <input type="submit" value="Generate Access Token">
    </form>
  </div>
</body>
</html>
