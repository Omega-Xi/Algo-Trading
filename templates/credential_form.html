<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credentials Form</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50, #34495e);
      height: 100vh;
    }
    .form-container {
      background-color: #1e1e1e;
      color: #f5f5f5;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 400px; /* wider for balance */
      text-align: center; /* center labels and heading */
    }
    .form-container h2 {
      margin-bottom: 20px;
      color: #ffffff;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center; /* center inputs horizontally */
    }
    label {
      align-self: flex-start; /* keep labels aligned left inside centered form */
      margin-bottom: 5px;
      font-size: 14px;
      color: #cccccc;
    }
    input[type="text"] {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 5px;
      background-color: #2c2c2c;
      color: #f5f5f5;
      width: 100%; /* full width inside container */
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
    }
    input[type="submit"] {
      padding: 12px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
      width: 100%; /* button spans full width */
    }
    input[type="submit"]:hover {
      background-color: #357ab8;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Enter API Credentials</h2>
    <form action="/authenticator/save_credentials" method="post">
      <label for="api_key">API Key:</label>
      <input type="text" id="api_key" name="api_key">

      <label for="api_secret">API Secret:</label>
      <input type="text" id="api_secret" name="api_secret">

      <label for="redirect_url">Redirect URL:</label>
      <input type="text" id="redirect_url" name="redirect_url">

      <label for="state">State:</label>
      <input type="text" id="state" name="state">

      <input type="submit" value="Save Credentials">
    </form>
  </div>
</body>
</html>
